- type: dynamicValue
  id: notoSansFont12
  value:
    valueType: Content.StyleSheetify.Client.Font.FontSpecifier
    value:
      font:
        - "/Fonts/NotoSans/NotoSans-Regular.ttf"
      size: 12

- type: dynamicValue
  id: notoSansMono12
  value:
    valueType: Content.StyleSheetify.Client.Font.FontSpecifier
    value:
      font:
        - "/Fonts/NotoSans/NotoSans-Regular.ttf"
      size: 12
      
- type: dynamicValue
  id: buttonSelectChat
  value:
    valueType: Robust.Client.Graphics.StyleBoxFlat
    value:
      contentMarginLeftOverride: 8
      contentMarginTopOverride: 8
      contentMarginBottomOverride: 8
      backgroundColor: "#111111"
      borderThickness: 5,0,0,0
      borderColor: "#aaaaaa"


- type: dynamicValue
  id: buttonSelectChatPushed
  value:
    parent: buttonSelectChat
    valueType: Robust.Client.Graphics.StyleBoxFlat
    value:
      backgroundColor: "#222222"
      borderColor: "#aaaaaa"

- type: styleSheet
  id: default
  typeDefinition:
    ContainerButton: "Robust.Client.UserInterface.Controls.ContainerButton"
  styles:
    .monospace:
      font: notoSansMono12
    "":
      font: notoSansFont12
      font-color: "#ffffff"
    .background-white:
      panel:
        valueType: Robust.Client.Graphics.StyleBoxFlat
        value:
          backgroundColor: "#FFFFFF"
    .main-background:
      panel:
        valueType: Robust.Client.Graphics.StyleBoxFlat
        value:
          backgroundColor: "#222222"
    ContainerButton.chat-select:normal:
      stylebox:
        parent: buttonSelectChat
        value:
          contentMarginLeftOverride: 10
          borderThickness: 8,0,0,0
    ContainerButton.chat-select:hover:
      stylebox: buttonSelectChat
    ContainerButton.chat-select:pressed:
      stylebox: buttonSelectChatPushed  
    ContainerButton.chat-select:disabled:
      stylebox: buttonSelectChatPushed